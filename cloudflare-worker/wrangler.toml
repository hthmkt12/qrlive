# Cloudflare Worker: QR Redirect Proxy
# Deploy: wrangler deploy --config cloudflare-worker/wrangler.toml
#
# Required secrets (set via CLI, never commit):
#   wrangler secret put SUPABASE_URL
#   wrangler secret put SUPABASE_ANON_KEY

name = "qrlive-redirect"
account_id = "75adc0ed2db47e1731c8f6105492cc0b"
main = "redirect-proxy.js"
compatibility_date = "2024-01-01"

# Production hostname for geo-aware QR redirects.
[[routes]]
pattern = "r.worldgate.space"
zone_name = "worldgate.space"
custom_domain = true

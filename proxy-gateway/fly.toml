# Fly.io deployment config for QRLive proxy-gateway
# Deploy: flyctl deploy --app qrlive-jp-974628
#
# Before deploying:
#   1. Change `app` to a unique name (must be globally unique on Fly.io)
#   2. flyctl auth login
#   3. flyctl apps create qrlive-jp-974628 --machines
#   4. flyctl secrets set UPSTREAM_ORIGIN=https://www.yoursite.com --app qrlive-jp-974628
#   5. flyctl deploy --app qrlive-jp-974628
#
# GFW block recovery: switch region to hkg
#   flyctl regions set hkg --app qrlive-jp-974628 && flyctl deploy --app qrlive-jp-974628

app = "qrlive-jp-974628"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[http_service.checks]]
  interval = "15s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/health"

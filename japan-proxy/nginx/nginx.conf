user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Hide nginx version
    server_tokens off;

    # Rate limiting zone — 10 req/s per IP, 10MB zone
    limit_req_zone $binary_remote_addr zone=proxy_limit:10m rate=10r/s;

    # Connection limit per IP
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    # Default server — drop requests with unknown Host header
    server {
        listen 80 default_server;
        listen 443 ssl default_server;
        ssl_certificate /etc/letsencrypt/live/placeholder/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/placeholder/privkey.pem;
        return 444;
    }

    # Load site configs
    include /etc/nginx/conf.d/*.conf;
}

# Japan Reverse Proxy — Site Template
# Copy this file to proxy-yoursite.conf and replace:
#   jp.company.com  → your Japan subdomain (DNS A record → this VPS)
#   www.company.com → your actual origin server

server {
    listen 80;
    server_name jp.company.com;

    # ACME challenge for Let's Encrypt SSL renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name jp.company.com;

    ssl_certificate /etc/letsencrypt/live/jp.company.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jp.company.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Max upload size (adjust if proxying file uploads)
    client_max_body_size 10m;

    # Health check endpoint — used by monitoring and Docker healthcheck
    location /health {
        access_log off;
        return 200 '{"status":"ok","server":"jp-proxy"}';
        add_header Content-Type application/json;
    }

    # Block common abuse paths
    location ~* ^/(wp-admin|wp-login|xmlrpc\.php|\.env|\.git) {
        return 404;
    }

    # Reverse proxy to origin
    location / {
        # Rate limiting: 10 req/s per IP, burst 20
        limit_req zone=proxy_limit burst=20 nodelay;
        # Max 50 concurrent connections per IP
        limit_conn conn_limit 50;

        # Forward to origin — hardcoded, NOT user-supplied (prevents open proxy abuse)
        proxy_pass https://www.company.com;
        proxy_set_header Host www.company.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rewrite redirects from origin domain to proxy domain
        proxy_redirect https://www.company.com https://jp.company.com;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Buffering (disable for file downloads to stream)
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        # No proxy-level caching — let origin control Cache-Control
        proxy_no_cache 1;
        proxy_cache_bypass 1;

        # Pass cookies through unchanged
        proxy_pass_header Set-Cookie;
    }
}
